<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dithered-camera</title>
  </head>
  <body>
    <div id="app">
      <div class="design-wrapper">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        
        <div class="camera-container">
          <canvas id="camera-canvas"></canvas>
        </div>

        <div class="menu-panel">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          
          <div class="menu-title">MENU</div>
          
          <div class="palette-options">
            <button class="palette-btn active" data-palette="bw">B&W</button>
            <button class="palette-btn" data-palette="retro">RETRO</button>
            <button class="palette-btn" data-palette="gb">GAMEBOY</button>
          </div>
          
          <div class="control-group">
            <label for="contrast">CONTRAST</label>
            <input type="range" id="contrast" min="0.5" max="2.0" step="0.1" value="1.1">
          </div>
          
          <div class="control-group">
            <label for="resolution">RESOLUTION</label>
            <input type="range" id="resolution" min="1" max="8" step="1" value="4">
          </div>
        </div>

        <button id="capture-btn" class="capture-btn">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
